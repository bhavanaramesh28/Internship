<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
    <label for="fullname">Name:</label><br><br>
    <input type="text" placeholder="Enter your name" name="fullname" id="fullname" required><br><br>




    <!-- Email -->
    <label for="email">Email Address:</label><br><br>
    <input type="email" placeholder="Enter valid mail id" name="email" id="email"><br><br>



    <!-- password -->
    <label for="psw">Password:</label><br><br>
 <input type="password" placeholder="" minlength="8" name="psw" id="psw"><br><br>



    <!-- radio button -->
     <p>Gender:</p>
     <input type="radio" id="male" name="gender" value="male">
     <label for="gender">Male</label><br><br>
     <input type="radio" id="female" name="gender" value="female">
     <label for="gender">Female</label><br><br>



     <!-- Checkbox -->
      <p>Technologies:</p>
      <input type="checkbox" name="html" id="html" value="html">
      <label for="html">HTML</label><br><br>
     <input type="checkbox" name="html" id="css" value="css">
      <label for="css">CSS</label><br><br>

      
      <!-- dropdown -->
       <label for="country">Country:</label><br><br>
       <select name="country" id="country">
        <option value="india">India</option><br><br>
        <option value="usa">USA</option><br><br>
        <option value="uk">UK</option><br><br>
        </select><br><br>
    


    <!-- text area -->
    
    <label for="message">Message:</label><br><br>
    <textarea name="message " id="messaage" placeholder="Please drop a message"></textarea><br><br>
          
    <!-- file upload -->
     <label for="resume">Upload resume:</label><br><br>
     <input type="file" name="resume" id="resume"><br><br>
       
     <!-- date picker -->
      <label for="dob">Date of birth:</label><br><br>
      <input type="date " name="dob" id="dob"><br><br>

    <!-- number input-->
    <label for="age">Age:</label><br><br>
    <input type="number" id="age" name="age" min="18" max="100"><br><br>

    <!-- button -->
    <button type="Submit">submit</button>
    <button type="reset">reset</button>
    </form>
    
</body>
</html>
